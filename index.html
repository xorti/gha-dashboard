<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHA Dashboard</title>
<script src="config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    color: #e6edf3;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  header h1 svg { color: #58a6ff; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: #8b949e;
  }

  #last-updated { font-variant-numeric: tabular-nums; }

  #refresh-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #e6edf3;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }

  #refresh-btn:hover { background: #30363d; }
  #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #notify-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 6px;
    color: #8b949e;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  #notify-btn:hover { background: #30363d; }
  #notify-btn.granted { color: #3fb950; border-color: #3fb950; }
  #notify-btn.denied  { color: #f85149; border-color: #f85149; }

  #refresh-btn.spinning svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    gap: 24px;
  }

  @media (max-width: 900px) {
    main { flex-direction: column; }
  }

  .column {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .column-heading {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #8b949e;
    padding: 0 2px;
  }

  .config-error {
    background: #2d1b1b;
    border: 1px solid #f85149;
    border-radius: 8px;
    padding: 16px 20px;
    color: #f85149;
    font-size: 14px;
    line-height: 1.6;
  }

  .config-error code {
    background: #1c1c1c;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 13px;
  }

  .repo-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
  }

  .repo-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid #30363d;
    background: #1c2128;
  }

  .repo-name {
    font-size: 14px;
    font-weight: 600;
    color: #58a6ff;
    text-decoration: none;
  }

  .repo-name:hover { text-decoration: underline; }

  .run-count {
    font-size: 12px;
    color: #8b949e;
  }

  .run-list { list-style: none; }

  .run-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid #21262d;
    transition: background 0.1s;
  }

  .run-item:last-child { border-bottom: none; }
  .run-item:hover { background: #1c2128; }

  .status-badge {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
  }

  .status-badge.success  { background: #238636; color: #fff; }
  .status-badge.failure  { background: #da3633; color: #fff; }
  .status-badge.cancelled{ background: #6e7681; color: #fff; }
  .status-badge.skipped  { background: #6e7681; color: #fff; }
  .status-badge.running  { background: #d29922; color: #fff; animation: pulse 1.5s ease-in-out infinite; }
  .status-badge.queued   { background: #388bfd; color: #fff; }
  .status-badge.unknown  { background: #444c56; color: #fff; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .run-info {
    flex: 1;
    min-width: 0;
  }

  .run-name {
    font-size: 13px;
    font-weight: 500;
    color: #e6edf3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .run-meta {
    font-size: 12px;
    color: #8b949e;
    margin-top: 2px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .run-meta span { display: flex; align-items: center; gap: 3px; }

  .run-link {
    font-size: 12px;
    color: #58a6ff;
    text-decoration: none;
    flex-shrink: 0;
    padding: 3px 8px;
    border: 1px solid #30363d;
    border-radius: 5px;
    transition: background 0.1s;
  }

  .run-link:hover { background: #21262d; }

  .repo-error {
    padding: 14px 16px;
    font-size: 13px;
    color: #f85149;
  }

  .repo-empty {
    padding: 14px 16px;
    font-size: 13px;
    color: #8b949e;
  }

  .skeleton {
    padding: 10px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .skel-row {
    height: 14px;
    background: linear-gradient(90deg, #21262d 25%, #30363d 50%, #21262d 75%);
    background-size: 200% 100%;
    border-radius: 4px;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .countdown {
    font-size: 12px;
    color: #8b949e;
    font-variant-numeric: tabular-nums;
  }

  /* --- Review chip --- */
  .review-chip {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 10px;
    white-space: nowrap;
  }

  .review-chip.approved          { background: #1a4429; color: #3fb950; }
  .review-chip.changes-requested { background: #3d1a1a; color: #f85149; }
  .review-chip.draft             { background: #21262d; color: #8b949e; }
  .review-chip.pending           { background: #21262d; color: #8b949e; }

  /* --- Toasts --- */
  #toast-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
    z-index: 100;
  }

  .toast {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 12px 14px;
    min-width: 260px;
    max-width: 360px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    cursor: pointer;
    animation: toast-in 0.2s ease;
  }

  .toast.hiding { animation: toast-out 0.2s ease forwards; }

  @keyframes toast-in  { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toast-out { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }

  .toast-badge {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 700;
    margin-top: 1px;
  }

  .toast-body { flex: 1; min-width: 0; }

  .toast-title {
    font-size: 13px;
    font-weight: 600;
    color: #e6edf3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .toast-sub {
    font-size: 12px;
    color: #8b949e;
    margin-top: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>
    <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    GHA Dashboard
  </h1>
  <div class="header-right">
    <span class="countdown" id="countdown"></span>
    <span id="last-updated"></span>
    <button id="notify-btn" title="Enable notifications">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 16a2 2 0 0 0 2-2H6a2 2 0 0 0 2 2zm.995-14.901a1 1 0 1 0-1.99 0A5.002 5.002 0 0 0 3 6c0 1.098-.5 6-2 7h14c-1.5-1-2-5.902-2-7 0-2.42-1.72-4.44-4.005-4.901z"/>
      </svg>
    </button>
    <button id="refresh-btn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
        <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
      </svg>
      Refresh
    </button>
  </div>
</header>

<main id="main">
  <div class="column" id="pr-column">
    <span class="column-heading">Pull Requests</span>
  </div>
  <div class="column" id="actions-column">
    <span class="column-heading">Actions</span>
  </div>
</main>
<div id="toast-container"></div>

<script>
(function () {
  const cfg = window.GHA_CONFIG;
  const main = document.getElementById('main');
  const prColumn = document.getElementById('pr-column');
  const actionsColumn = document.getElementById('actions-column');
  const refreshBtn = document.getElementById('refresh-btn');
  const notifyBtn = document.getElementById('notify-btn');
  const lastUpdatedEl = document.getElementById('last-updated');
  const countdownEl = document.getElementById('countdown');
  const toastContainer = document.getElementById('toast-container');

  let countdownTimer = null;
  let secondsLeft = 0;

  // --- Notifications ---
  const prevActionStates = new Map(); // runId -> { status, conclusion }
  const prevPRStates = new Map();     // "repo#number" -> { ci, review }
  let isFirstLoad = true;

  function updateNotifyBtn() {
    const perm = Notification.permission;
    notifyBtn.classList.toggle('granted', perm === 'granted');
    notifyBtn.classList.toggle('denied',  perm === 'denied');
    notifyBtn.title = perm === 'granted' ? 'Notifications on'
                    : perm === 'denied'  ? 'Notifications blocked — check browser settings'
                    : 'Enable notifications';
  }

  notifyBtn.addEventListener('click', async () => {
    if (!('Notification' in window)) return;
    if (Notification.permission !== 'granted') {
      await Notification.requestPermission();
    }
    updateNotifyBtn();
  });

  updateNotifyBtn();

  function showToast(cls, icon, title, sub) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `
      <span class="toast-badge status-badge ${cls}">${icon}</span>
      <div class="toast-body">
        <div class="toast-title">${title}</div>
        <div class="toast-sub">${sub}</div>
      </div>`;

    function dismiss() {
      el.classList.add('hiding');
      el.addEventListener('animationend', () => el.remove(), { once: true });
    }

    el.addEventListener('click', dismiss);
    toastContainer.appendChild(el);
    setTimeout(dismiss, 5000);
  }

  function notify(repo, run, from, to) {
    const s = statusInfo(run);
    showToast(s.cls, s.icon, `${escHtml(repo)} — ${escHtml(run.name)}`, `${escHtml(from)} → ${escHtml(to)}`);
    if (Notification.permission === 'granted') {
      new Notification(`${repo}: ${run.name}`, {
        body: `${from} → ${to}`,
        icon: 'https://github.com/favicon.ico',
        tag: String(run.id)
      });
    }
  }

  function diffActionRuns(repo, runs) {
    if (isFirstLoad) return;
    for (const run of runs) {
      const prev = prevActionStates.get(run.id);
      if (!prev) continue;
      const prevLabel = prev.status === 'completed' ? prev.conclusion : prev.status;
      const currLabel = run.status === 'completed' ? run.conclusion : run.status;
      if (prevLabel !== currLabel) notify(repo, run, prevLabel, currLabel);
    }
  }

  function saveActionStates(runs) {
    for (const run of runs) {
      prevActionStates.set(run.id, { status: run.status, conclusion: run.conclusion });
    }
  }

  function diffPRs(repo, prs) {
    if (isFirstLoad) return;
    for (const pr of prs) {
      const key = `${repo}#${pr.number}`;
      const prev = prevPRStates.get(key);
      if (!prev) continue;
      if (prev.ci !== pr._ci || prev.review !== pr._review) {
        const ciLabel = ciInfo(pr._ci);
        showToast(ciLabel.cls, ciLabel.icon,
          `${escHtml(repo)} #${pr.number}`,
          `${escHtml(pr.title.slice(0, 60))}${pr.title.length > 60 ? '…' : ''}`
        );
      }
    }
  }

  function savePRStates(repo, prs) {
    for (const pr of prs) {
      prevPRStates.set(`${repo}#${pr.number}`, { ci: pr._ci, review: pr._review });
    }
  }

  // --- Config validation ---
  function configError(msg) {
    main.innerHTML = `<div class="config-error">${msg}</div>`;
  }

  if (!cfg) {
    configError('Could not load <code>config.js</code>. Make sure it is in the same folder as <code>index.html</code> and defines <code>window.GHA_CONFIG</code>.');
    return;
  }
  if (!cfg.token || cfg.token === 'ghp_YOUR_TOKEN_HERE') {
    configError('Set your GitHub Personal Access Token in <code>config.js</code> (<code>token</code> field).');
    return;
  }
  if (!cfg.username || cfg.username === 'your-github-username') {
    configError('Set your GitHub username in <code>config.js</code> (<code>username</code> field).');
    return;
  }
  if (!Array.isArray(cfg.repos) || cfg.repos.length === 0) {
    configError('Add at least one repo to the <code>repos</code> array in <code>config.js</code>, e.g. <code>"owner/repo"</code>.');
    return;
  }

  const headers = {
    Authorization: `Bearer ${cfg.token}`,
    Accept: 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };

  // --- Helpers ---
  function relativeTime(iso) {
    const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (diff < 60) return `${diff}s ago`;
    if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  }

  function statusInfo(run) {
    if (run.status === 'in_progress') return { cls: 'running',  icon: '●', label: 'Running' };
    if (run.status === 'queued')      return { cls: 'queued',   icon: '○', label: 'Queued' };
    if (run.status === 'waiting')     return { cls: 'queued',   icon: '○', label: 'Waiting' };
    const c = run.conclusion;
    if (c === 'success')   return { cls: 'success',   icon: '✓', label: 'Success' };
    if (c === 'failure')   return { cls: 'failure',   icon: '✗', label: 'Failed' };
    if (c === 'cancelled') return { cls: 'cancelled', icon: '⊘', label: 'Cancelled' };
    if (c === 'skipped')   return { cls: 'skipped',   icon: '—', label: 'Skipped' };
    return { cls: 'unknown', icon: '?', label: run.status };
  }

  // ci is one of: 'success' | 'failure' | 'running' | 'unknown'
  function ciInfo(ci) {
    if (ci === 'success') return { cls: 'success', icon: '✓', label: 'CI passed' };
    if (ci === 'failure') return { cls: 'failure', icon: '✗', label: 'CI failed' };
    if (ci === 'running') return { cls: 'running', icon: '●', label: 'CI running' };
    return { cls: 'unknown', icon: '?', label: 'No CI' };
  }

  function mergeLabel(state) {
    if (state === 'clean')   return '⬆ Ready';
    if (state === 'dirty')   return '✗ Conflicts';
    if (state === 'blocked') return '⊘ Blocked';
    if (state === 'behind')  return '↓ Behind';
    return null;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- Actions render ---
  function renderSkeleton(repoName) {
    return `
      <div class="repo-card" id="card-${repoName.replace('/','-')}">
        <div class="repo-header">
          <a class="repo-name" href="https://github.com/${escHtml(repoName)}/actions" target="_blank" rel="noopener">${escHtml(repoName)}</a>
          <span class="run-count">loading…</span>
        </div>
        <div class="skeleton">
          <div class="skel-row" style="width:70%"></div>
          <div class="skel-row" style="width:50%"></div>
          <div class="skel-row" style="width:60%"></div>
        </div>
      </div>`;
  }

  function renderCard(repoName, runs, error) {
    const id = `card-${repoName.replace('/', '-')}`;
    let body;

    if (error) {
      body = `<div class="repo-error">⚠ ${escHtml(error)}</div>`;
    } else if (runs.length === 0) {
      body = `<div class="repo-empty">No runs found for <strong>${escHtml(cfg.username)}</strong> in this repo.</div>`;
    } else {
      const items = runs.map(run => {
        const s = statusInfo(run);
        const branch = run.head_branch || '';
        const event  = run.event || '';
        const ago    = relativeTime(run.created_at);
        return `
          <li class="run-item">
            <span class="status-badge ${s.cls}" title="${s.label}">${s.icon}</span>
            <div class="run-info">
              <div class="run-name">${escHtml(run.name)}</div>
              <div class="run-meta">
                ${branch ? `<span>⎇ ${escHtml(branch)}</span>` : ''}
                ${event  ? `<span>${escHtml(event)}</span>` : ''}
                <span>${escHtml(ago)}</span>
              </div>
            </div>
            <a class="run-link" href="${escHtml(run.html_url)}" target="_blank" rel="noopener">open ↗</a>
          </li>`;
      }).join('');
      body = `<ul class="run-list">${items}</ul>`;
    }

    const countLabel = error ? 'error' : `${runs.length} run${runs.length !== 1 ? 's' : ''}`;
    return `
      <div class="repo-card" id="${id}">
        <div class="repo-header">
          <a class="repo-name" href="https://github.com/${escHtml(repoName)}/actions" target="_blank" rel="noopener">${escHtml(repoName)}</a>
          <span class="run-count">${countLabel}</span>
        </div>
        ${body}
      </div>`;
  }

  function updateCard(repoName, runs, error) {
    const id = `card-${repoName.replace('/', '-')}`;
    const el = document.getElementById(id);
    if (!el) return;
    el.outerHTML = renderCard(repoName, runs, error);
  }

  // --- PR render ---
  function renderPRSkeleton(repoName) {
    return `
      <div class="repo-card" id="pr-card-${repoName.replace('/','-')}">
        <div class="repo-header">
          <a class="repo-name" href="https://github.com/${escHtml(repoName)}/pulls" target="_blank" rel="noopener">${escHtml(repoName)}</a>
          <span class="run-count">loading…</span>
        </div>
        <div class="skeleton">
          <div class="skel-row" style="width:75%"></div>
          <div class="skel-row" style="width:55%"></div>
          <div class="skel-row" style="width:65%"></div>
        </div>
      </div>`;
  }

  function renderPRCard(repoName, prs, error) {
    const id = `pr-card-${repoName.replace('/', '-')}`;
    let body;

    if (error) {
      body = `<div class="repo-error">⚠ ${escHtml(error)}</div>`;
    } else if (prs.length === 0) {
      body = `<div class="repo-empty">No open PRs for <strong>${escHtml(cfg.username)}</strong> in this repo.</div>`;
    } else {
      const items = prs.map(pr => {
        const ci = ciInfo(pr._ci);
        const ago = relativeTime(pr.updated_at);
        const branch = pr.head && pr.head.ref ? pr.head.ref : '';
        const merge = mergeLabel(pr.mergeable_state);

        let reviewChip = '';
        if (pr.draft) {
          reviewChip = `<span class="review-chip draft">Draft</span>`;
        } else if (pr._review === 'approved') {
          reviewChip = `<span class="review-chip approved">✓ Approved</span>`;
        } else if (pr._review === 'changes_requested') {
          reviewChip = `<span class="review-chip changes-requested">✗ Changes</span>`;
        } else {
          reviewChip = `<span class="review-chip pending">○ Pending</span>`;
        }

        return `
          <li class="run-item">
            <span class="status-badge ${ci.cls}" title="${ci.label}">${ci.icon}</span>
            <div class="run-info">
              <div class="run-name">#${pr.number} ${escHtml(pr.title)}</div>
              <div class="run-meta">
                ${branch ? `<span>⎇ ${escHtml(branch)}</span>` : ''}
                ${reviewChip}
                ${merge ? `<span>${escHtml(merge)}</span>` : ''}
                <span>${escHtml(ago)}</span>
              </div>
            </div>
            <a class="run-link" href="${escHtml(pr.html_url)}" target="_blank" rel="noopener">open ↗</a>
          </li>`;
      }).join('');
      body = `<ul class="run-list">${items}</ul>`;
    }

    const countLabel = error ? 'error' : `${prs.length} PR${prs.length !== 1 ? 's' : ''}`;
    return `
      <div class="repo-card" id="${id}">
        <div class="repo-header">
          <a class="repo-name" href="https://github.com/${escHtml(repoName)}/pulls" target="_blank" rel="noopener">${escHtml(repoName)}</a>
          <span class="run-count">${countLabel}</span>
        </div>
        ${body}
      </div>`;
  }

  function updatePRCard(repoName, prs, error) {
    const id = `pr-card-${repoName.replace('/', '-')}`;
    const el = document.getElementById(id);
    if (!el) return;
    el.outerHTML = renderPRCard(repoName, prs, error);
  }

  // --- Fetch ---
  async function fetchRepo(repo) {
    const [owner, name] = repo.split('/');
    const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(name)}/actions/runs?actor=${encodeURIComponent(cfg.username)}&event=workflow_dispatch&per_page=50`;
    const res = await fetch(url, { headers });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    const cutoff = Date.now() - 5 * 24 * 60 * 60 * 1000;
    return (data.workflow_runs || [])
      .filter(r => new Date(r.created_at).getTime() >= cutoff)
      .filter(r => r.actor && r.actor.type !== 'Bot')
      .slice(0, 10);
  }

  async function fetchCheckRuns(owner, name, sha) {
    const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(name)}/commits/${encodeURIComponent(sha)}/check-runs?per_page=100`;
    const res = await fetch(url, { headers });
    if (!res.ok) return [];
    const data = await res.json();
    return data.check_runs || [];
  }

  async function fetchReviews(owner, name, number) {
    const url = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(name)}/pulls/${number}/reviews`;
    const res = await fetch(url, { headers });
    if (!res.ok) return [];
    return await res.json();
  }

  async function fetchPRs(repo) {
    const [owner, name] = repo.split('/');

    // Use search API so we find all PRs involving the user, not just the most recent 20
    const q = encodeURIComponent(`is:pr is:open involves:${cfg.username} repo:${owner}/${name}`);
    const searchUrl = `https://api.github.com/search/issues?q=${q}&per_page=100`;
    const searchRes = await fetch(searchUrl, { headers });
    if (!searchRes.ok) {
      const body = await searchRes.json().catch(() => ({}));
      throw new Error(body.message || `HTTP ${searchRes.status}`);
    }
    const { items } = await searchRes.json();

    if (items.length === 0) return [];

    // Fetch full PR objects in parallel — needed for head.sha, head.ref, mergeable_state, requested_reviewers
    const fullPRs = await Promise.all(
      items.map(item =>
        fetch(`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(name)}/pulls/${item.number}`, { headers })
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
      )
    );
    const prs = fullPRs.filter(Boolean);

    // Fan-out: fetch CI + reviews for each PR in parallel
    await Promise.all(prs.map(async pr => {
      const sha = pr.head.sha;
      const [checkRuns, reviews] = await Promise.all([
        fetchCheckRuns(owner, name, sha),
        fetchReviews(owner, name, pr.number)
      ]);

      // Aggregate CI
      if (checkRuns.length === 0) {
        pr._ci = 'unknown';
      } else {
        const statuses = checkRuns.map(c =>
          (c.status === 'in_progress' || c.status === 'queued') ? 'running'
          : (['failure','timed_out','action_required','startup_failure'].includes(c.conclusion)) ? 'failure'
          : 'success'
        );
        if (statuses.includes('running'))      pr._ci = 'running';
        else if (statuses.includes('failure')) pr._ci = 'failure';
        else                                   pr._ci = 'success';
      }

      // Aggregate reviews: last review per reviewer, ignoring COMMENTED/DISMISSED
      const lastByReviewer = new Map();
      for (const r of reviews) {
        if (r.state === 'COMMENTED' || r.state === 'DISMISSED') continue;
        lastByReviewer.set(r.user.login, r.state);
      }
      const states = [...lastByReviewer.values()];
      if (states.includes('CHANGES_REQUESTED'))    pr._review = 'changes_requested';
      else if (states.length > 0 && states.every(s => s === 'APPROVED')) pr._review = 'approved';
      else                                         pr._review = 'pending';
    }));

    return prs;
  }

  // --- Refresh loops ---
  async function refreshActions() {
    if (actionsColumn.querySelectorAll('.repo-card').length === 0) {
      const heading = actionsColumn.querySelector('.column-heading');
      cfg.repos.forEach(repo => {
        heading.insertAdjacentHTML('afterend', renderSkeleton(repo));
      });
    }

    await Promise.all(cfg.repos.map(async repo => {
      try {
        const runs = await fetchRepo(repo);
        diffActionRuns(repo, runs);
        saveActionStates(runs);
        updateCard(repo, runs, null);
      } catch (err) {
        updateCard(repo, [], err.message);
      }
    }));
  }

  async function refreshPRs() {
    if (prColumn.querySelectorAll('.repo-card').length === 0) {
      const heading = prColumn.querySelector('.column-heading');
      cfg.repos.forEach(repo => {
        heading.insertAdjacentHTML('afterend', renderPRSkeleton(repo));
      });
    }

    await Promise.all(cfg.repos.map(async repo => {
      try {
        const prs = await fetchPRs(repo);
        diffPRs(repo, prs);
        savePRStates(repo, prs);
        updatePRCard(repo, prs, null);
      } catch (err) {
        updatePRCard(repo, [], err.message);
      }
    }));
  }

  async function refresh() {
    refreshBtn.disabled = true;
    refreshBtn.classList.add('spinning');
    clearCountdown();

    await Promise.all([refreshActions(), refreshPRs()]);

    isFirstLoad = false;

    const now = new Date();
    lastUpdatedEl.textContent = `Updated ${now.toLocaleTimeString()}`;
    refreshBtn.disabled = false;
    refreshBtn.classList.remove('spinning');

    startCountdown(cfg.refreshInterval || 30);
  }

  function startCountdown(secs) {
    secondsLeft = secs;
    countdownEl.textContent = `Next in ${secondsLeft}s`;
    countdownTimer = setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearCountdown();
        refresh();
      } else {
        countdownEl.textContent = `Next in ${secondsLeft}s`;
      }
    }, 1000);
  }

  function clearCountdown() {
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
    countdownEl.textContent = '';
  }

  refreshBtn.addEventListener('click', refresh);

  // Kick off
  refresh();
})();
</script>
</body>
</html>
